---
# Read the Docs configuration for the soep-preparation MyST / Jupyter Book site.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# The docs are built with mystmd via pixi (`pixi run build-docs`), which runs
# `docs/_generate_variables.py` and then `jupyter book build --html`, emitting the
# site to `docs/_build/html`. Read the Docs has no native pixi support, so we drive
# the whole build through `build.commands`: install pixi, run the existing task, and
# copy the generated HTML into the location Read the Docs publishes.
version: 2
build:
  os: ubuntu-24.04
  commands:
    - curl -fsSL https://pixi.sh/install.sh | bash
    - ~/.pixi/bin/pixi run build-docs
    - mkdir -p "$READTHEDOCS_OUTPUT/html"
    - cp -r docs/_build/html/. "$READTHEDOCS_OUTPUT/html/"
